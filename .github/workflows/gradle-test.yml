name: Gradle Test

on:
  # Run tests after merge and collect coverage as canonical source of truth
  push:
    # Your production branch. If not the default, update here and set Target Branch at https://gitauto.ai/settings/rules to match
    branches: [master]
    paths:
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.java'
      - '**/build.gradle*'
      - 'gradle/**'
      - 'settings.gradle*'
  # Allow manual trigger for debugging
  workflow_dispatch:

# Cancel older runs when new commits are pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean

      - name: Create dummy google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            echo '{"project_info":{"project_id":"placeholder","project_number":"000000000000","firebase_url":"https://placeholder.firebaseio.com","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"app.komikku"}},"api_key":[{"current_key":""}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}},{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000001","android_client_info":{"package_name":"app.komikku.beta"}},"api_key":[{"current_key":""}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
          fi

      - name: Generate moko resources
        run: ./gradlew :i18n:generateMRcommonMain --stacktrace

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew testReleaseUnitTest
          else
            ./gradlew testReleaseUnitTest jacocoTestReport
          fi

      - name: Convert JaCoCo XML to LCOV
        if: github.event_name != 'pull_request'
        run: |
          pip install lcov_cobertura 2>/dev/null || true
          mkdir -p coverage
          find . -path "*/reports/jacoco/*.xml" -o -path "*/jacocoTestReport/*.xml" | head -1 | while read xml; do
            python -m lcov_cobertura "$xml" -o coverage/lcov.info 2>/dev/null || true
          done

      - name: Upload coverage report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report
          path: coverage/lcov.info
