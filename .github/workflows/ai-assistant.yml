
name: AI Assistant

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

  contents: read

jobs:
  ai-assistant:
    runs-on: 'ubuntu-24.04'
    if: contains(github.event.comment.body, '@kimi') || 
        contains(github.event.issue.body, '@kimi') ||
        contains(github.event.pull_request.body, '@kimi')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - name: Get repository context
        id: context
        run: |
          echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "issue_number=${{ github.event.issue.number || github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          
      - name: Read relevant files
        run: |
          # Read recent commits for context
          git log --oneline -10 > /tmp/recent_commits.txt
          
          # Read changed files if PR
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff --name-only HEAD~1 > /tmp/changed_files.txt
          fi
          
          # Read project docs
          cat docs/COMPLETE_IMPLEMENTATION_SUMMARY.md > /tmp/project_status.txt 2>/dev/null || echo "No status file"

      - name: AI Assistant Response
        uses: actions/github-script@v7
